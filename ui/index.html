<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Specter toolbar</title>
    <style>
      :root {
        --bg: #1d1f23;
        --field: #2b2e34;
        --field-focus: #34373f;
        --tab: #26282d;
        --tab-active: #34373f;
        --text: #e8eaed;
        --muted: #9aa0a6;
        --accent: #6aa3ff;
        --border: #3a3d44;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        user-select: none;
      }
      .chrome {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* ---- Tab strip ---- */
      .tabs {
        flex: 0 0 auto;
        height: 38px;
        display: flex;
        align-items: flex-end;
        gap: 4px;
        padding: 6px 8px 0;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
      }
      .tabs::-webkit-scrollbar { display: none; }
      .tab {
        flex: 0 1 200px;
        min-width: 70px;
        height: 32px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 6px 0 12px;
        border-radius: 9px 9px 0 0;
        background: var(--tab);
        color: var(--muted);
        font-size: 12px;
        cursor: default;
        white-space: nowrap;
        overflow: hidden;
      }
      .tab.active { background: var(--tab-active); color: var(--text); }
      .tab:hover:not(.active) { background: #2e3137; }
      .tab .label {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tab .spinner {
        flex: 0 0 auto;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid var(--muted);
        border-top-color: var(--accent);
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .tab .close {
        all: unset;
        flex: 0 0 auto;
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 5px;
        font-size: 14px;
        color: var(--muted);
        cursor: pointer;
      }
      .tab .close:hover { background: rgba(255, 255, 255, 0.14); color: var(--text); }
      .newtab {
        all: unset;
        flex: 0 0 auto;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 7px;
        color: var(--muted);
        font-size: 18px;
        cursor: pointer;
      }
      .newtab:hover { background: var(--field); color: var(--text); }

      /* ---- Downloads ---- */
      .download {
        all: unset;
        position: relative;
        flex: 0 0 auto;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
      }
      .download.hidden { display: none; }
      .download:hover { background: var(--field); color: var(--text); }
      .download.done { color: #38c172; }
      .download .dspin {
        display: none;
        position: absolute;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        animation: spin 0.7s linear infinite;
      }
      .download.active .dglyph { visibility: hidden; }
      .download.active .dspin { display: block; }
      .download .badge {
        display: none;
        position: absolute;
        top: -1px;
        right: -1px;
        min-width: 14px;
        height: 14px;
        padding: 0 3px;
        border-radius: 7px;
        background: var(--accent);
        color: #0b1220;
        font-size: 9px;
        font-weight: 600;
        align-items: center;
        justify-content: center;
      }
      .dltoast {
        position: absolute;
        right: 10px;
        bottom: 7px;
        max-width: 62%;
        padding: 6px 10px;
        border-radius: 8px;
        background: var(--field-focus);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
        cursor: pointer;
        opacity: 0;
        transform: translateY(6px);
        transition: opacity 0.15s ease, transform 0.15s ease;
        pointer-events: none;
      }
      .dltoast.show { opacity: 1; transform: none; pointer-events: auto; }

      /* ---- Nav row ---- */
      .bar {
        position: relative;
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
      }
      button.nav {
        all: unset;
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        transition: background 0.12s ease, color 0.12s ease;
      }
      button.nav:hover { background: var(--field); color: var(--text); }
      button.nav:active { background: var(--field-focus); }
      form {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
      }
      input {
        flex: 1;
        min-width: 0;
        height: 34px;
        line-height: normal;
        padding: 0 18px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--field);
        color: var(--text);
        font-size: 14px;
        outline: none;
        user-select: text;
        transition: border-color 0.12s ease, background 0.12s ease;
      }
      input:focus {
        border-color: var(--accent);
        background: var(--field-focus);
      }
      input::placeholder { color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="chrome">
      <div class="tabs" id="tabs"></div>
      <div class="bar">
        <button class="nav" id="back" title="Back">&#8592;</button>
        <button class="nav" id="forward" title="Forward">&#8594;</button>
        <button class="nav" id="reload" title="Reload">&#8635;</button>
        <form id="navform">
          <input
            id="address"
            type="text"
            placeholder="Search or enter address"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          />
        </form>
        <button class="download hidden" id="downloads" title="Downloads — open folder">
          <span class="dglyph">&#8595;</span>
          <span class="dspin"></span>
          <span class="badge"></span>
        </button>
        <div class="dltoast" id="dltoast" title="Open Downloads"></div>
      </div>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      const address = document.getElementById("address");
      const tabsEl = document.getElementById("tabs");

      document.getElementById("back").onclick = () => invoke("go_back");
      document.getElementById("forward").onclick = () => invoke("go_forward");
      document.getElementById("reload").onclick = () => invoke("reload");

      // ---- Downloads indicator ----
      const dlBtn = document.getElementById("downloads");
      const dlBadge = dlBtn.querySelector(".badge");
      const dlToast = document.getElementById("dltoast");
      let dlActive = 0; // in-flight downloads
      let dlDone = 0; // completed this session
      const dlNames = []; // filenames awaiting completion (FIFO)
      let dlToastTimer;

      dlBtn.addEventListener("click", () => invoke("open_downloads"));
      dlToast.addEventListener("click", () => invoke("open_downloads"));

      function refreshDownloads() {
        dlBtn.classList.toggle("hidden", dlActive === 0 && dlDone === 0);
        dlBtn.classList.toggle("active", dlActive > 0);
        dlBtn.classList.toggle("done", dlActive === 0 && dlDone > 0);
        dlBadge.style.display = dlDone > 0 ? "flex" : "none";
        dlBadge.textContent = String(dlDone);
        dlBtn.title = dlActive > 0
          ? dlActive + " downloading…"
          : "Downloads — open folder";
      }
      function showToast(text) {
        dlToast.textContent = text;
        dlToast.classList.add("show");
        clearTimeout(dlToastTimer);
        dlToastTimer = setTimeout(() => dlToast.classList.remove("show"), 3500);
      }

      listen("download-started", (e) => {
        dlActive++;
        dlNames.push(e.payload || "download");
        refreshDownloads();
      });
      listen("download-finished", (e) => {
        if (dlActive > 0) dlActive--;
        const name = dlNames.shift() || "download";
        if (e.payload) {
          dlDone++;
          showToast("↓  " + name);
        } else {
          showToast("✕  Download failed");
        }
        refreshDownloads();
      });

      // ---- Address autocomplete history ----
      const HISTORY_KEY = "specter.visitHistory.v1";
      const HISTORY_LIMIT = 600;
      const TOOLBAR_TARGET_CSS = 88;
      let visitHistory = loadHistory();
      let inlineCompletion = null;
      let acceptedCompletion = null;
      let completingInline = false;

      function loadHistory() {
        try {
          const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
          return Array.isArray(parsed) ? parsed.filter((item) => item && item.url) : [];
        } catch {
          return [];
        }
      }
      function saveHistory() {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(visitHistory.slice(0, HISTORY_LIMIT)));
      }
      function canRemember(url) {
        return Boolean(url && url !== "about:blank" && !/^data:/i.test(url));
      }
      function displayTitleForHistory(url, title) {
        const cleanTitle = (title || "").trim();
        if (cleanTitle && cleanTitle !== url) return cleanTitle;
        return labelFor(url);
      }
      function hostFor(url) {
        if (url && url[0] === "/") return "";
        try {
          return new URL(url).hostname.replace(/^www\./, "");
        } catch {
          return "";
        }
      }
      function completionTextFor(item, query) {
        const url = item.url || "";
        const host = item.host || "";
        const title = item.title || "";
        const lowerQuery = query.toLowerCase();
        if (url.toLowerCase().startsWith(lowerQuery)) {
          try {
            const parsed = new URL(url);
            if (parsed.pathname === "/" && !parsed.search && !parsed.hash) {
              return parsed.origin;
            }
          } catch {
            /* keep the original URL */
          }
          return url;
        }
        if (host.toLowerCase().startsWith(lowerQuery)) {
          try {
            const parsed = new URL(url);
            const path = parsed.pathname === "/" ? "" : parsed.pathname;
            return host + path + parsed.search + parsed.hash;
          } catch {
            return host || url;
          }
        }
        if (title.toLowerCase().startsWith(lowerQuery)) return title;
        return "";
      }
      function rememberVisit(url, title, countVisit = true) {
        if (!canRemember(url)) return;
        const now = Date.now();
        const existing = visitHistory.find((item) => item.url === url);
        if (existing) {
          existing.title = displayTitleForHistory(url, title || existing.title);
          existing.host = hostFor(url);
          if (countVisit) {
            existing.lastVisited = now;
            existing.visits = (existing.visits || 0) + 1;
          }
        } else {
          visitHistory.unshift({
            url,
            title: displayTitleForHistory(url, title),
            host: hostFor(url),
            lastVisited: now,
            visits: 1,
          });
        }
        visitHistory.sort((a, b) => (b.lastVisited || 0) - (a.lastVisited || 0));
        if (visitHistory.length > HISTORY_LIMIT) visitHistory.length = HISTORY_LIMIT;
        saveHistory();
      }
      function rememberTabs(list) {
        for (const tab of list || []) {
          rememberVisit(tab.url, tab.title, false);
        }
      }
      function scoreHistoryItem(item, query) {
        const url = (item.url || "").toLowerCase();
        const title = (item.title || "").toLowerCase();
        const host = (item.host || "").toLowerCase();
        const completion = completionTextFor(item, query);
        if (!completion) {
          return -1;
        }
        let score = 0;
        if (host.startsWith(query)) score += 110;
        if (title.startsWith(query)) score += 95;
        if (url.startsWith(query)) score += 80;
        if (host.includes(query)) score += 45;
        if (title.includes(query)) score += 35;
        if (url.includes(query)) score += 25;
        score += Math.min(item.visits || 1, 20) * 2;
        score += Math.max(0, 30 - (Date.now() - (item.lastVisited || 0)) / 86400000);
        return score;
      }
      function bestInlineMatch(query) {
        const q = query.trim().toLowerCase();
        if (!q) return null;
        return visitHistory
          .map((item) => ({
            item,
            score: scoreHistoryItem(item, q),
            text: completionTextFor(item, q),
          }))
          .filter((entry) => entry.score >= 0)
          .sort((a, b) => b.score - a.score)
          [0] || null;
      }
      function clearInlineCompletion() {
        inlineCompletion = null;
      }
      function applyInlineCompletion() {
        if (completingInline || document.activeElement !== address) return;
        if (address.selectionStart !== address.selectionEnd) return;

        const typed = address.value;
        const query = typed.trim();
        clearInlineCompletion();
        acceptedCompletion = null;
        if (!query) return;

        const match = bestInlineMatch(query);
        if (!match || !match.text || match.text.toLowerCase() === query.toLowerCase()) {
          return;
        }
        if (!match.text.toLowerCase().startsWith(query.toLowerCase())) return;

        completingInline = true;
        address.value = typed + match.text.slice(query.length);
        address.setSelectionRange(typed.length, address.value.length);
        inlineCompletion = {
          text: match.text,
          url: match.item.url,
          typed,
        };
        completingInline = false;
      }

      document.getElementById("navform").addEventListener("submit", (e) => {
        e.preventDefault();
        const hasInlineSelection = inlineCompletion
          && address.selectionStart === inlineCompletion.typed.length
          && address.selectionEnd === address.value.length
          && address.value === inlineCompletion.text;
        const hasAcceptedCompletion = acceptedCompletion
          && address.value === acceptedCompletion.text;
        const url = hasInlineSelection
          ? inlineCompletion.url
          : hasAcceptedCompletion
            ? acceptedCompletion.url
            : address.value.trim();
        if (url) {
          clearInlineCompletion();
          acceptedCompletion = null;
          invoke("navigate", { url });
          address.blur();
        }
      });
      address.addEventListener("input", () => {
        if (completingInline) return;
        applyInlineCompletion();
      });
      address.addEventListener("keydown", (e) => {
        if (e.key === "Tab" && inlineCompletion) {
          e.preventDefault();
          address.value = inlineCompletion.text;
          address.setSelectionRange(address.value.length, address.value.length);
          acceptedCompletion = {
            text: inlineCompletion.text,
            url: inlineCompletion.url,
          };
          clearInlineCompletion();
        } else if (e.key === "Escape") {
          clearInlineCompletion();
          acceptedCompletion = null;
          address.setSelectionRange(address.value.length, address.value.length);
        } else if (e.key === "Backspace" || e.key === "Delete") {
          clearInlineCompletion();
          acceptedCompletion = null;
        }
      });

      // ---- Tabs ----
      function labelFor(url) {
        if (!url || url === "about:blank") return "New Tab";
        // Local file tab (address bar shows the full path) -> label with filename.
        if (url[0] === "/") {
          return url.split("/").filter(Boolean).pop() || url;
        }
        try {
          const h = new URL(url).hostname.replace(/^www\./, "");
          return h || url;
        } catch {
          return url || "New Tab";
        }
      }
      function titleFor(t) {
        return (t.title && t.title.trim()) || labelFor(t.url);
      }
      function renderTabs(list) {
        rememberTabs(list);
        tabsEl.innerHTML = "";
        for (const t of list) {
          const tab = document.createElement("div");
          tab.className = "tab" + (t.active ? " active" : "");
          tab.title = t.url;
          tab.addEventListener("click", () => invoke("select_tab", { id: t.id }));

          if (t.loading) {
            const spinner = document.createElement("span");
            spinner.className = "spinner";
            tab.appendChild(spinner);
          }

          const label = document.createElement("span");
          label.className = "label";
          label.textContent = titleFor(t);
          tab.appendChild(label);

          const close = document.createElement("button");
          close.className = "close";
          close.textContent = "×";
          close.title = "Close tab";
          close.addEventListener("click", (e) => {
            e.stopPropagation();
            invoke("remove_tab", { id: t.id });
          });
          tab.appendChild(close);

          tabsEl.appendChild(tab);
        }
        const plus = document.createElement("button");
        plus.className = "newtab";
        plus.textContent = "+";
        plus.title = "New tab";
        plus.addEventListener("click", () => invoke("new_tab", { url: null }));
        tabsEl.appendChild(plus);
      }
      listen("tabs-changed", (event) => renderTabs(event.payload));

      // The toolbar webview's rendered CSS height doesn't map cleanly from the
      // physical size Rust sets on scaled/HiDPI displays. So we report our real
      // innerHeight to Rust, which measures the ratio and resizes us to hit the
      // target. A short loop converges (usually in one step).
      let calibrating = false;
      async function calibrate() {
        if (calibrating) return;
        calibrating = true;
        try {
          for (let i = 0; i < 4; i++) {
            const h = window.innerHeight;
            if (Math.abs(h - TOOLBAR_TARGET_CSS) <= 1) break;
            await invoke("calibrate_toolbar", { measuredCssHeight: h });
            await new Promise((r) => setTimeout(r, 90));
          }
        } catch (e) {
          /* leave the toolbar at its best-effort size */
        } finally {
          calibrating = false;
        }
      }
      window.addEventListener("load", () => {
        setTimeout(async () => {
          await calibrate();
          // Fetch the current tabs once we're loaded (earlier events are missed).
          invoke("request_tabs");
          // If the startup tab is blank (no URL arg), focus the address bar to
          // type into. If launched with a URL, leave the bar showing that URL.
          setTimeout(() => {
            if (!address.value) {
              address.focus();
              address.select();
            }
          }, 60);
        }, 50);
      });
      let resizeTimer;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(calibrate, 150);
      });

      // Address bar tracks the active tab's main-frame URL.
      listen("url-changed", (event) => {
        rememberVisit(event.payload, "");
        if (document.activeElement !== address) {
          address.value = event.payload;
        }
      });

      // Cmd/Ctrl+L: the native menu accelerator focuses this webview and emits
      // "focus-address"; we then select all the text so the user can type over it.
      listen("focus-address", () => {
        address.focus();
        address.select();
      });

      // Fallback for when the toolbar webview already holds keyboard focus.
      window.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && (e.key === "l" || e.key === "L")) {
          e.preventDefault();
          address.focus();
          address.select();
        }
      });
    </script>
  </body>
</html>
